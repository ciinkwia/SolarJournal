<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f59e0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SolarJournal">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.svg">
  <title>Solar Journal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-row">
      <div>
        <h1>Solar Journal</h1>
        <p class="subtitle">Daily Learning Highlights</p>
      </div>
      <div id="user-info" class="user-info hidden">
        <span id="user-name" class="user-name"></span>
        <button id="sign-out-btn" class="sign-out-btn">Sign Out</button>
      </div>
    </div>
    <!-- Tab navigation -->
    <nav id="tab-nav" class="tab-nav hidden">
      <button class="tab-btn active" data-tab="today">Today</button>
      <button class="tab-btn" data-tab="journal">Journal</button>
    </nav>
  </header>

  <!-- Sign-in screen -->
  <div id="auth-screen" class="auth-screen hidden">
    <div class="auth-card">
      <div class="auth-icon">&#9788;</div>
      <h2>Solar Journal</h2>
      <p>Track 3 key highlights from your day on the job. AI expands on each one to deepen your understanding.</p>
      <button id="google-sign-in-btn" class="google-sign-in-btn">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.997 8.997 0 0 0 0 9s0 0 0 0a9 9 0 0 0 .957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
        Sign in with Google
      </button>
    </div>
  </div>

  <!-- App content -->
  <main id="app-content" class="hidden">

    <!-- TODAY VIEW -->
    <section id="today-view">
      <!-- Edit form (in-progress entries) -->
      <form id="today-form" class="today-form hidden">
        <label class="field-label" for="title-input">Entry Title (optional)</label>
        <input type="text" id="title-input" class="field-input" autocomplete="off" />

        <div class="highlight-slot" data-index="0">
          <div class="slot-header">
            <span class="slot-num">1</span>
            <span class="slot-label">Key Highlight</span>
          </div>
          <textarea class="highlight-textarea" data-index="0" rows="5" placeholder="What did you learn, see, or figure out today?"></textarea>
        </div>

        <div class="highlight-slot" data-index="1">
          <div class="slot-header">
            <span class="slot-num">2</span>
            <span class="slot-label">Key Highlight</span>
          </div>
          <textarea class="highlight-textarea" data-index="1" rows="5" placeholder="What's another thing that stood out?"></textarea>
        </div>

        <div class="highlight-slot" data-index="2">
          <div class="slot-header">
            <span class="slot-num">3</span>
            <span class="slot-label">Key Highlight</span>
          </div>
          <textarea class="highlight-textarea" data-index="2" rows="5" placeholder="One more — anything you're still figuring out?"></textarea>
        </div>

        <label class="field-label" for="notes-input">General Notes (optional)</label>
        <textarea id="notes-input" class="field-input" rows="3" placeholder="Any other thoughts about today..."></textarea>

        <button type="submit" id="complete-btn" class="complete-btn">
          <span class="btn-text">Complete &amp; Generate Expansions</span>
          <span class="btn-loading hidden"><span class="spinner"></span> Expanding highlights...</span>
        </button>
      </form>

      <!-- Completed view (read-only with expansions) -->
      <div id="today-completed" class="hidden">
        <div class="completed-message">
          <span>&#10003;</span> Entry complete
        </div>
        <div id="completed-body"></div>
      </div>
    </section>

    <!-- JOURNAL VIEW -->
    <section id="journal-view" class="hidden">
      <div id="journal-list" class="journal-list"></div>
      <div id="journal-empty" class="empty-state hidden">
        <p>No completed entries yet. Finish today's highlights to see them here!</p>
      </div>
      <button id="load-more-btn" class="load-more-btn hidden">Load More</button>
    </section>

  </main>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyCbYeJxGHH1PjiB2bF_t4pZFa7UyFClMuA",
      authDomain: "solarjournal.onrender.com",
      projectId: "solarnotes-9c059",
      storageBucket: "solarnotes-9c059.firebasestorage.app",
      messagingSenderId: "898044212836",
      appId: "1:898044212836:web:37cd7f7edcb19704ed5171"
    });
  </script>
  <script src="app.js?v=5"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
